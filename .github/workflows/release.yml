name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: runtime/backend/requirements*.txt
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install Python dependencies
        run: python -m pip install -r runtime/backend/requirements-dev.txt
      - name: Install JavaScript dependencies
        run: npm ci --prefix apps/desktop
      - name: Build installer
        run: npm run build:release
      - name: Create checksum
        shell: pwsh
        run: |
          $bundleDir = "apps/desktop/src-tauri/target/release/bundle/msi"
          $msis = @(Get-ChildItem -LiteralPath $bundleDir -Filter "*.msi")
          if ($msis.Count -ne 1) {
            throw "Expected exactly one MSI, found $($msis.Count)"
          }

          $msi = $msis[0]
          $releaseVersion = if ($env:GITHUB_REF_NAME -like "v*") { $env:GITHUB_REF_NAME } else { "v1.2.2" }
          $releasePath = Join-Path $bundleDir "CSS-Loader-for-Millennium_${releaseVersion}_x64_en-US.msi"
          Move-Item -LiteralPath $msi.FullName -Destination $releasePath -Force
          $msi = Get-Item -LiteralPath $releasePath

          $stream = [System.IO.File]::OpenRead($msi.FullName)
          try {
            $sha256 = [System.Security.Cryptography.SHA256]::Create()
            try {
              $hashBytes = $sha256.ComputeHash($stream)
            } finally {
              $sha256.Dispose()
            }
          } finally {
            $stream.Dispose()
          }
          $checksum = -join ($hashBytes | ForEach-Object { $_.ToString("x2") })
          "$checksum  $($msi.Name)" | Set-Content -LiteralPath (Join-Path $bundleDir "SHA256SUMS.txt") -Encoding ascii
      - uses: actions/upload-artifact@v7
        with:
          name: css-loader-for-millennium-msi
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/msi/SHA256SUMS.txt
          if-no-files-found: error
      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $bundleDir = "apps/desktop/src-tauri/target/release/bundle/msi"
          $msis = @(Get-ChildItem -LiteralPath $bundleDir -Filter "*.msi")
          if ($msis.Count -ne 1) {
            throw "Expected exactly one MSI, found $($msis.Count)"
          }

          $msi = $msis[0]
          $checksum = Get-Item -LiteralPath (Join-Path $bundleDir "SHA256SUMS.txt")
          $notesPath = ".github/release-notes/$($env:GITHUB_REF_NAME).md"
          $arguments = @(
            "release", "create", $env:GITHUB_REF_NAME,
            $msi.FullName,
            $checksum.FullName,
            "--verify-tag",
            "--title", "CSS Loader for Millennium $env:GITHUB_REF_NAME"
          )

          if (Test-Path -LiteralPath $notesPath) {
            $arguments += @("--notes-file", $notesPath)
          } else {
            $arguments += "--generate-notes"
          }

          & gh @arguments
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
