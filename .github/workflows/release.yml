name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: runtime/backend/requirements*.txt
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            plugins/millennium/package-lock.json
            apps/desktop/package-lock.json
      - name: Install Python dependencies
        run: python -m pip install -r runtime/backend/requirements-dev.txt
      - name: Install JavaScript dependencies
        shell: pwsh
        run: |
          npm ci --prefix plugins/millennium
          npm ci --prefix apps/desktop
      - name: Build installer
        run: npm run build:release
      - name: Create checksum
        shell: pwsh
        run: |
          $bundleDir = "apps/desktop/src-tauri/target/release/bundle/msi"
          $msis = @(Get-ChildItem -LiteralPath $bundleDir -Filter "*.msi")
          if ($msis.Count -ne 1) {
            throw "Expected exactly one MSI, found $($msis.Count)"
          }

          $msi = $msis[0]
          $releaseVersion = if ($env:GITHUB_REF_NAME -like "v*") { $env:GITHUB_REF_NAME } else { "v1.1" }
          $releasePath = Join-Path $bundleDir "CSS-Loader-for-Millennium_${releaseVersion}_x64_en-US.msi"
          Move-Item -LiteralPath $msi.FullName -Destination $releasePath -Force
          $msi = Get-Item -LiteralPath $releasePath

          $backendSource = "runtime/backend/dist/CSS Loader for Millennium Backend.exe"
          $backendPath = Join-Path $bundleDir "CSS-Loader-for-Millennium-Backend_${releaseVersion}.exe"
          Copy-Item -LiteralPath $backendSource -Destination $backendPath -Force
          $backend = Get-Item -LiteralPath $backendPath

          $checksumLines = foreach ($artifact in @($msi, $backend)) {
            $stream = [System.IO.File]::OpenRead($artifact.FullName)
            try {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              try {
                $hashBytes = $sha256.ComputeHash($stream)
              } finally {
                $sha256.Dispose()
              }
            } finally {
              $stream.Dispose()
            }
            $checksum = -join ($hashBytes | ForEach-Object { $_.ToString("x2") })
            "$checksum  $($artifact.Name)"
          }
          $checksumLines | Set-Content -LiteralPath (Join-Path $bundleDir "SHA256SUMS.txt") -Encoding ascii
      - uses: actions/upload-artifact@v7
        with:
          name: css-loader-for-millennium-msi
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/msi/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/SHA256SUMS.txt
          if-no-files-found: error
      - name: Create draft tagged release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $bundleDir = "apps/desktop/src-tauri/target/release/bundle/msi"
          $msis = @(Get-ChildItem -LiteralPath $bundleDir -Filter "*.msi")
          if ($msis.Count -ne 1) {
            throw "Expected exactly one MSI, found $($msis.Count)"
          }

          $msi = $msis[0]
          $backends = @(Get-ChildItem -LiteralPath $bundleDir -Filter "*.exe")
          if ($backends.Count -ne 1) {
            throw "Expected exactly one backend executable, found $($backends.Count)"
          }
          $backend = $backends[0]
          $checksum = Get-Item -LiteralPath (Join-Path $bundleDir "SHA256SUMS.txt")
          $notesPath = ".github/release-notes/$($env:GITHUB_REF_NAME).md"
          $arguments = @(
            "release", "create", $env:GITHUB_REF_NAME,
            $msi.FullName, $backend.FullName,
            $checksum.FullName,
            "--verify-tag",
            "--draft",
            "--prerelease",
            "--title", "CSS Loader for Millennium $env:GITHUB_REF_NAME (Preview)"
          )

          if (Test-Path -LiteralPath $notesPath) {
            $arguments += @("--notes-file", $notesPath)
          } else {
            $arguments += "--generate-notes"
          }

          & gh @arguments
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
