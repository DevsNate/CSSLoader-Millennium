name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  runtime:
    name: Python runtime
    runs-on: windows-latest
    defaults:
      run:
        working-directory: runtime/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: runtime/backend/requirements*.txt
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m unittest discover -s tests -v
      - run: python -m PyInstaller --noconfirm CSS-Loader-for-Millennium-Backend.spec

  desktop:
    name: Desktop UI
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
